name: Build and push Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: markriggins/suitecrm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: ver
        run: |
          V=$(grep '^SUITECRM_VERSION=' VERSION | cut -d= -f2)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "line=${V%.*}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            SUITECRM_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.line }}
